<div id="inventory-popup" class="popup" data-edge-label="Inventory">
    <div class="popup-content">
        <div class="popup-header">
            <h2>Inventory</h2>
            <button type="button" class="popup-close-btn" aria-label="Close inventory">×</button>
        </div>
        <p class="inventory-drag-helper">Drag an item into a compartment to equip it.</p>
        <p id="inventory-message" aria-live="polite"></p>
        <div id="inventory-list"></div>
    </div>
</div>
