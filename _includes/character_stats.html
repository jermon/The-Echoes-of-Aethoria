<header id="character-stats">
    <div class="character-stats-heading">
        <h2>Heroic Attributes</h2>
        <button id="open-skills" type="button">Open Skills</button>
    </div>
    <div id="stats-container">
        <div class="stat">
            <div class="stat-heading">
                <label for="strength">Strength</label>
                <span id="strength-value" class="stat-value"></span>
            </div>
            <div class="stat-bar"><div id="strength" class="stat-fill"></div></div>
        </div>
        <div class="stat">
            <div class="stat-heading">
                <label for="endurance">Endurance</label>
                <span id="endurance-value" class="stat-value"></span>
            </div>
            <div class="stat-bar"><div id="endurance" class="stat-fill"></div></div>
        </div>
        <div class="stat">
            <div class="stat-heading">
                <label for="dexterity">Dexterity</label>
                <span id="dexterity-value" class="stat-value"></span>
            </div>
            <div class="stat-bar"><div id="dexterity" class="stat-fill"></div></div>
        </div>
        <div class="stat">
            <div class="stat-heading">
                <label for="intelligence">Intelligence</label>
                <span id="intelligence-value" class="stat-value"></span>
            </div>
            <div class="stat-bar"><div id="intelligence" class="stat-fill"></div></div>
        </div>
        <div class="stat">
            <div class="stat-heading">
                <label for="wisdom">Wisdom</label>
                <span id="wisdom-value" class="stat-value"></span>
            </div>
            <div class="stat-bar"><div id="wisdom" class="stat-fill"></div></div>
        </div>
    </div>
</header>

<div id="skills-popup" class="popup">
    <div class="popup-content">
        <h2>Skill Tree</h2>
        <p class="skill-tree-helper">From broad disciplines to specialized techniques.</p>
        <div id="skills-tree"></div>
        <button id="close-skills" type="button">Close</button>
    </div>
</div>
