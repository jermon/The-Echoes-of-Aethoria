---
layout: game
title: The Dark Path
foes:
  - forest-troll
---

The darker path narrows into a shadow-choked corridor of ancient trees. A hulking forest troll drags itself from the undergrowth, blocking your way with a guttural roar.

<div id="combat-panel">
    <div class="combat-stats-container">
        <div class="combat-stats">
            <h3><span id="foe-name">Foe</span></h3>
            <div id="foe-stats" class="combat-stat-grid"></div>
        </div>
        <div class="combat-stats">
            <h3>You</h3>
            <div id="hero-stats" class="combat-stat-grid"></div>
        </div>
    </div>
    
    <label for="weapon-choice">Choose your weapon:</label>
    <select id="weapon-choice"></select>
    <div class="combat-actions">
        <button type="button" id="attack-button">Attack</button>
        <button type="button" id="flee-button">Flee</button>
    </div>
    <p id="combat-status" aria-live="polite"></p>
    <div id="combat-log" aria-live="polite"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const foeIds = {{ page.foes | jsonify }};
    const foeTemplate = foeIds && foeIds.length > 0 ? getFoeData(foeIds[0]) : null;
    const foe = foeTemplate ? { ...foeTemplate } : null;

    if (!foe) {
        console.error('No foe data available');
        return;
    }

    initializeCombat('combat-panel', foe, {
        successMessage: `The ${foe.name} collapses unconscious. You are victorious.`,
        successRedirect: 'defeat_troll',
        defeatRedirect: 'death'
    });
});
</script>
