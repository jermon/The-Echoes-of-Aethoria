---
layout: default
---
<h1>{{ site.title }}</h1>
{% include character_stats.html %}
<div id="game-container">
    <h1>{{ page.title }}</h1>
    <div id="story-text">
        {{ content }}
    </div>
    {% include available_items.html %}
    {% include choices.html %}
    {% include inventory_popup.html %}
    <script>
        window.GAME_DATA = {
            items: {{ site.data.items | jsonify }},
            foes: {{ site.data.foes | jsonify }}
        };
        window.PAGE_STAT_BONUSES = {{ page.stat_bonuses | jsonify }};
    </script>
    <script src="{{ '/assets/js/game.js' | relative_url }}"></script>
</div>
